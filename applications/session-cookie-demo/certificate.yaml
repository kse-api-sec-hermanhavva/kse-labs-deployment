apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: session-cookie-demo-tls
  namespace: applications
spec:
  secretName: session-cookie-demo-tls
  commonName: session-cookie-demo.192.168.50.10.nip.io
  dnsNames:
    - session-cookie-demo.192.168.50.10.nip.io
  duration: 720h
  renewBefore: 240h
  issuerRef:
    name: vault-pki-int
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
